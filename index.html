<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrador de Citas Médicas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor">
        <h1>Registrador de Citas Médicas</h1>
        <p>Ingresa tus datos para agendar una cita. Se confirmará al instante sin recargar.</p>
        
        <form id="formCita">
            <label for="nombre">Nombre del paciente:</label>
            <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required pattern="[A-Za-z\s]+" title="Solo letras y espacios">
            
            <label for="fecha">Fecha de la cita:</label>
            <input type="date" id="fecha" required min="2024-01-01">
            
            <label for="doctor">Selecciona doctor:</label>
            <select id="doctor" required>
                <option value="">-- Elige un doctor --</option>
                <option value="Dr. Montes">Dr. Montes (General)</option>
                <option value="Dra. Girón">Dra. Girón (Pediatría)</option>
                <option value="Dr. Alexis">Dr. Alexis (Especialista)</option>
            </select>
            
            <button type="button" id="btnAgendar">Agendar Cita</button>
        </form>
        
        <h2>Citas Agendadas</h2>
        <div id="listaCitas"></div>
    </div>

    <script src="escrips.js"></script>
</body>
</html>
